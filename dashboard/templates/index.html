<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
  .sidebar { background: #1a1d27; border-right: 1px solid #2a2d3a; min-height: 100vh; padding: 1.5rem; }
  .main { padding: 1.5rem; }
  .job-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem; transition: border-color 0.2s; }
  .job-card:hover { border-color: #5b7fff; }
  .job-card.yes { border-left: 4px solid #22c55e; }
  .job-card.maybe { border-left: 4px solid #f59e0b; }
  .badge-tech { background: #1e3a5f; color: #60a5fa; font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; margin: 2px; display: inline-block; }
  .badge-bad { background: #3b1f1f; color: #f87171; font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; margin: 2px; display: inline-block; }
  .badge-role { background: #1e3350; color: #93c5fd; font-size: 0.75rem; border-radius: 4px; padding: 2px 8px; }
  .badge-h1b-yes { background: #14532d; color: #86efac; font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; }
  .badge-h1b-no { background: #450a0a; color: #fca5a5; font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; }
  .badge-clearance { background: #7c2d12; color: #fdba74; font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; }
  .filter-section { margin-bottom: 1.2rem; }
  .filter-section label { font-size: 0.8rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; display: block; }
  .filter-section select, .filter-section input { background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; border-radius: 6px; padding: 6px 10px; width: 100%; font-size: 0.85rem; }
  .filter-section select:focus, .filter-section input:focus { outline: none; border-color: #5b7fff; }
  .job-title { font-size: 1rem; font-weight: 600; color: #f0f0f0; text-decoration: none; }
  .job-title:hover { color: #60a5fa; }
  .job-meta { color: #9ca3af; font-size: 0.82rem; margin-top: 3px; }
  .results-count { color: #6b7280; font-size: 0.85rem; margin-bottom: 1rem; }
  h5.sidebar-title { color: #9ca3af; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  .btn-reset { background: #2a2d3a; border: none; color: #9ca3af; font-size: 0.8rem; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  .btn-reset:hover { background: #3a3d4a; color: #e0e0e0; }
  #loading { color: #6b7280; text-align: center; padding: 3rem; }
</style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar" style="width: 240px; flex-shrink: 0;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="sidebar-title mb-0">Filters</h5>
      <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>

    <div class="filter-section">
      <label>Search</label>
      <input type="text" id="f-search" placeholder="title, company..." oninput="applyFilters()">
    </div>

    <div class="filter-section">
      <label>Bucket</label>
      <select id="f-bucket" onchange="applyFilters()">
        <option value="all">All</option>
        <option value="yes">✅ Yes</option>
        <option value="maybe">🤔 Maybe</option>
      </select>
    </div>

    <div class="filter-section">
      <label>Role Category</label>
      <select id="f-role" onchange="applyFilters()">
        <option value="">All Roles</option>
        <option value="ml_engineer">ML Engineer / AI</option>
        <option value="data_scientist">Data Scientist</option>
        <option value="data_engineer">Data Engineer</option>
        <option value="data_analyst">Data Analyst</option>
        <option value="swe">Software Engineer</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="filter-section">
      <label>Experience Level</label>
      <select id="f-exp" onchange="applyFilters()">
        <option value="">All Levels</option>
        <option value="entry">Entry Level</option>
        <option value="mid" selected>Mid Level</option>
        <option value="senior">Senior</option>
      </select>
    </div>

    <div class="filter-section">
      <label>Security Clearance</label>
      <select id="f-clearance" onchange="applyFilters()">
        <option value="exclude" selected>Exclude clearance jobs</option>
        <option value="include">Show all</option>
      </select>
    </div>

    <div class="filter-section">
      <label>H1B Sponsorship</label>
      <select id="f-h1b" onchange="applyFilters()">
        <option value="all">All</option>
        <option value="yes">Sponsors H1B</option>
        <option value="unknown">Unknown</option>
        <option value="no">No sponsorship</option>
      </select>
    </div>

    <div class="filter-section">
      <label>Tech Stack Match</label>
      <select id="f-bad-tech" onchange="applyFilters()">
        <option value="exclude" selected>Exclude Java/C++/hardware</option>
        <option value="include">Show all</option>
      </select>
    </div>

    <hr style="border-color: #2a2d3a; margin: 1.5rem 0;">
    <h5 class="sidebar-title">Overview</h5>
    <div id="stats-area" style="font-size: 0.82rem; color: #9ca3af; line-height: 2;">Loading...</div>
  </div>

  <div class="main flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 style="color: #f0f0f0; margin: 0;">Job Board <span style="color: #5b7fff;">Dashboard</span></h4>
      <button class="btn btn-sm" style="background:#2a2d3a; color:#9ca3af; border:none;" onclick="loadJobs()">↻ Refresh</button>
    </div>
    <div id="results-count" class="results-count"></div>
    <div id="loading">Loading jobs...</div>
    <div id="jobs-container"></div>
  </div>
</div>

<script>
const ROLE_LABELS = {
  ml_engineer: "ML Engineer", data_scientist: "Data Scientist",
  data_engineer: "Data Engineer", data_analyst: "Data Analyst",
  swe: "Software Engineer", other: "Other"
};

function getFilters() {
  return {
    bucket: document.getElementById("f-bucket").value,
    role: document.getElementById("f-role").value,
    exp: document.getElementById("f-exp").value,
    clearance: document.getElementById("f-clearance").value,
    h1b: document.getElementById("f-h1b").value,
    bad_tech: document.getElementById("f-bad-tech").value,
    search: document.getElementById("f-search").value,
  };
}

function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function renderJob(j) {
  const bucketClass = j.bucket === "yes" ? "yes" : "maybe";
  const bucketBadge = j.bucket === "yes"
    ? '<span style="color:#22c55e; font-size:0.75rem;">✅ YES</span>'
    : '<span style="color:#f59e0b; font-size:0.75rem;">🤔 MAYBE</span>';
  const roleBadge = `<span class="badge-role">${ROLE_LABELS[j.role_category] || j.role_category}</span>`;
  const h1bBadge = j.h1b_status === "yes" ? '<span class="badge-h1b-yes">H1B ✓</span>'
    : j.h1b_status === "no" ? '<span class="badge-h1b-no">No Sponsorship</span>' : '';
  const clearanceBadge = j.clearance_required ? '<span class="badge-clearance">🔒 Clearance</span>' : '';
  const goodTech = (j.good_tech || []).map(t => `<span class="badge-tech">${t}</span>`).join("");
  const badTech = (j.bad_tech || []).map(t => `<span class="badge-bad">⚠️ ${t}</span>`).join("");
  const postedStr = j.posted ? ` · Posted ${j.posted}` : "";

  return `
    <div class="job-card ${bucketClass}">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <a href="${j.url}" target="_blank" class="job-title">${j.title}</a>
          <div class="job-meta">${j.company} · ${j.location}${postedStr}</div>
        </div>
        <div class="text-end" style="flex-shrink:0; margin-left:1rem;">
          ${bucketBadge}
          <div style="color:#6b7280; font-size:0.75rem; margin-top:2px;">${formatDate(j.date_found)}</div>
        </div>
      </div>
      <div class="mt-2">${roleBadge} ${h1bBadge} ${clearanceBadge}</div>
      ${goodTech || badTech ? `<div class="mt-2">${goodTech}${badTech}</div>` : ""}
    </div>`;
}

async function loadJobs() {
  const f = getFilters();
  const params = new URLSearchParams(Object.entries(f).filter(([,v]) => v)).toString();
  document.getElementById("loading").style.display = "block";
  document.getElementById("jobs-container").innerHTML = "";
  try {
    const data = await fetch(`/api/jobs?${params}`).then(r => r.json());
    document.getElementById("loading").style.display = "none";
    document.getElementById("results-count").textContent = `Showing ${data.filtered} of ${data.total} total jobs`;
    document.getElementById("jobs-container").innerHTML = data.jobs.length
      ? data.jobs.map(renderJob).join("")
      : '<div style="color:#6b7280; text-align:center; padding:3rem;">No jobs match your filters.</div>';
  } catch (e) {
    document.getElementById("loading").innerHTML = "Error loading jobs. Is the server running?";
  }
}

async function loadStats() {
  try {
    const s = await fetch("/api/stats").then(r => r.json());
    document.getElementById("stats-area").innerHTML = `
      <div>Total: <strong style="color:#e0e0e0;">${s.total}</strong></div>
      <div>Yes: <strong style="color:#22c55e;">${s.yes}</strong> · Maybe: <strong style="color:#f59e0b;">${s.maybe}</strong></div>
      <div>Clearance jobs: <strong style="color:#f97316;">${s.clearance}</strong></div>
      <div>H1B confirmed: <strong style="color:#86efac;">${s.h1b_yes}</strong></div>
      <div style="margin-top:0.5rem; color:#6b7280; font-size:0.75rem;">By role:</div>
      <div>ML Eng: ${s.roles.ml_engineer} · DS: ${s.roles.data_scientist}</div>
      <div>DE: ${s.roles.data_engineer} · SWE: ${s.roles.swe}</div>`;
  } catch(e) {}
}

let debounceTimer;
function applyFilters() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadJobs, 300); }

function resetFilters() {
  document.getElementById("f-search").value = "";
  document.getElementById("f-bucket").value = "all";
  document.getElementById("f-role").value = "";
  document.getElementById("f-exp").value = "mid";
  document.getElementById("f-clearance").value = "exclude";
  document.getElementById("f-h1b").value = "all";
  document.getElementById("f-bad-tech").value = "exclude";
  loadJobs();
}

loadJobs();
loadStats();
</script>
</body>
</html>
