<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Board</title>
<style>
  :root {
    --bg: #f6f4ed;
    --panel: #fffdf8;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #ddd6c7;
    --good: #166534;
    --warn: #b45309;
    --bad: #991b1b;
    --accent: #0f766e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Georgia, 'Times New Roman', serif; background: var(--bg); color: var(--ink); }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .nav { display: flex; gap: 16px; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 14px; }
  .nav h1 { margin: 0; font-size: 1.3rem; color: var(--accent); flex: 1; }
  .nav a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
  .layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
  /* Sidebar */
  .sidebar { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; height: fit-content; }
  .sidebar h3 { margin: 0 0 16px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .filter-group { margin-bottom: 14px; }
  .filter-group label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
  .filter-group select,
  .filter-group input { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; font: inherit; font-size: 0.84rem; background: #fff; color: var(--ink); }
  .filter-group select:focus, .filter-group input:focus { outline: 1px solid var(--accent); }
  .btn-reset { width: 100%; background: none; border: 1px solid var(--line); border-radius: 999px; padding: 7px; font: inherit; font-size: 0.82rem; color: var(--muted); cursor: pointer; margin-top: 6px; }
  .btn-reset:hover { background: var(--bg); }
  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .stat strong { display: block; font-size: 1.6rem; line-height: 1.1; }
  .stat span { color: var(--muted); font-size: 0.85rem; }
  /* Results */
  .results-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }
  /* Job cards */
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; border-left: 4px solid var(--line); }
  .card.yes { border-left-color: var(--good); }
  .card.maybe { border-left-color: var(--warn); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-title { font-size: 1rem; font-weight: 700; color: var(--ink); text-decoration: none; }
  .card-title:hover { color: var(--accent); }
  .card-company { font-size: 0.88rem; color: var(--muted); margin-top: 3px; }
  .card-right { text-align: right; flex-shrink: 0; }
  .bucket-yes { color: var(--good); font-size: 0.8rem; font-weight: 700; }
  .bucket-maybe { color: var(--warn); font-size: 0.8rem; font-weight: 700; }
  .card-date { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
  .card-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; font-size: 0.75rem; background: #fff; }
  .pill-role { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
  .pill-tech { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
  .pill-bad { background: #fef2f2; border-color: #fecaca; color: var(--bad); }
  .pill-h1b { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
  .pill-noh1b { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
  .pill-clearance { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
  .pill-h1b-history { background: #eef2ff; border-color: #c7d2fe; color: #3730a3; cursor: help; }
  .score-badge { display: inline-block; min-width: 34px; padding: 2px 7px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; text-align: center; }
  .score-high { background: #dcfce7; color: #166534; }
  .score-mid  { background: #fef9c3; color: #854d0e; }
  .score-low  { background: #fee2e2; color: #991b1b; }
  .empty { color: var(--muted); text-align: center; padding: 3rem; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; }
  #loading { color: var(--muted); text-align: center; padding: 3rem; }
  .pagination { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 22px 0 8px; }
  .pagination button { background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 8px 18px; font: inherit; font-size: 0.85rem; cursor: pointer; color: var(--ink); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination button:hover:not(:disabled) { background: var(--bg); }
  .page-info { font-size: 0.85rem; color: var(--muted); }
  /* Scan button + status */
  .btn-scan { background: #fff; color: var(--accent); border: 1px solid var(--accent); border-radius: 999px; padding: 7px 16px; font: inherit; cursor: pointer; font-size: 0.85rem; }
  .btn-scan:hover:not(:disabled) { background: var(--bg); }
  .btn-scan:disabled { opacity: 0.6; cursor: not-allowed; }
  #scan-status { font-size: 0.8rem; color: var(--muted); }
  /* Today's New Postings */
  .today-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; margin-bottom: 18px; overflow: hidden; }
  .today-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; }
  .today-header h3 { margin: 0; font-size: 0.95rem; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .today-badge { background: var(--good); color: #fff; border-radius: 999px; padding: 1px 9px; font-size: 0.75rem; font-weight: 700; }
  .today-container { max-height: 480px; overflow-y: auto; padding: 0 18px 14px; }
  .today-container .card { margin-bottom: 10px; }
  .today-collapsed .today-container { display: none; }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <h1>Job Board</h1>
    <span id="scan-status"></span>
    <button id="scan-btn" class="btn-scan" onclick="runScan()">▶ Run New Scan</button>
    <button onclick="loadJobs()" style="background:var(--accent);color:#fff;border:none;border-radius:999px;padding:7px 16px;font:inherit;cursor:pointer;font-size:0.85rem;">↻ Refresh</button>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-row">
    <div class="stat"><strong>—</strong><span>Total</span></div>
    <div class="stat"><strong style="color:var(--good)">—</strong><span>Yes</span></div>
    <div class="stat"><strong style="color:var(--warn)">—</strong><span>Maybe</span></div>
    <div class="stat"><strong style="color:var(--accent)">—</strong><span>H1B confirmed</span></div>
  </div>

  <!-- Today's New Postings -->
  <div class="today-wrap" id="today-wrap">
    <div class="today-header" onclick="toggleToday()">
      <h3>🆕 Today's New Postings <span class="today-badge" id="today-badge">0</span></h3>
      <span id="today-toggle-icon">▾</span>
    </div>
    <div class="today-container" id="today-container">
      <div class="empty" style="padding:1.5rem;">Loading…</div>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Filters</h3>

      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="f-search" placeholder="title, company..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label>Bucket</label>
        <select id="f-bucket" onchange="applyFilters()">
          <option value="all">All</option>
          <option value="yes">✓ Yes</option>
          <option value="maybe">~ Maybe</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Role</label>
        <select id="f-role" onchange="applyFilters()">
          <option value="">All Roles</option>
          <option value="ml_engineer">ML Engineer / AI</option>
          <option value="data_scientist">Data Scientist</option>
          <option value="data_engineer">Data Engineer</option>
          <option value="data_analyst">Data Analyst</option>
          <option value="swe">Software Engineer</option>
          <option value="cloud_engineer">Cloud / Platform Engineer</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Experience Level</label>
        <select id="f-exp" onchange="applyFilters()">
          <option value="">All Levels</option>
          <option value="entry">Entry</option>
          <option value="mid" selected>Mid</option>
          <option value="senior">Senior</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Security Clearance</label>
        <select id="f-clearance" onchange="applyFilters()">
          <option value="exclude" selected>Exclude clearance</option>
          <option value="include">Show all</option>
        </select>
      </div>
      <div class="filter-group">
        <label>H1B Sponsorship (from JD text)</label>
        <select id="f-h1b" onchange="applyFilters()">
          <option value="all">All</option>
          <option value="yes">Sponsors H1B (stated)</option>
          <option value="unknown">Unknown / not stated</option>
          <option value="no">No sponsorship</option>
        </select>
      </div>
      <div class="filter-group">
        <label title="Based on past H1B filing volume (DOL LCA data), not a guarantee for this cycle — see docs/STATE.md">H1B Sponsor History ⓘ</label>
        <select id="f-h1b-history" onchange="applyFilters()">
          <option value="all">All</option>
          <option value="known">Known historical sponsor</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tech Stack</label>
        <select id="f-bad-tech" onchange="applyFilters()">
          <option value="exclude" selected>Exclude Java/C++/etc</option>
          <option value="include">Show all</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort by</label>
        <select id="f-sort" onchange="applyFilters()">
          <option value="date">Date found (newest)</option>
          <option value="score">Score (highest)</option>
        </select>
      </div>
      <button class="btn-reset" onclick="resetFilters()">Reset filters</button>

      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0 14px;">
      <h3>By Role</h3>
      <div id="role-stats" style="font-size:0.82rem;color:var(--muted);line-height:2;">—</div>

      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0 14px;">
      <h3>H1B Sponsor History</h3>
      <div id="h1b-history-stat" style="font-size:0.78rem;color:var(--muted);line-height:1.5;">—</div>
    </div>

    <!-- Main -->
    <div>
      <div id="results-meta" class="results-meta"></div>
      <div id="loading">Loading jobs…</div>
      <div id="jobs-container"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </div>
</div>

<script>
const ROLE_LABELS = {
  ml_engineer: "ML Engineer", data_scientist: "Data Scientist",
  data_engineer: "Data Engineer", data_analyst: "Data Analyst",
  swe: "Software Engineer", cloud_engineer: "Cloud / Platform Engineer", other: "Other"
};

const PAGE_SIZE = 25; // jobs per page — change this to whatever page size you want
let currentJobs = [];
let currentPage = 1;

function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function scoreBadge(score) {
  const cls = score >= 70 ? "score-high" : score >= 40 ? "score-mid" : "score-low";
  return `<span class="score-badge ${cls}">${score || 0}</span>`;
}

function renderJob(j) {
  const cls = j.bucket === "yes" ? "yes" : "maybe";
  const bucketHtml = j.bucket === "yes"
    ? '<span class="bucket-yes">&#10003; YES</span>'
    : '<span class="bucket-maybe">~ MAYBE</span>';

  const rolePill = `<span class="pill pill-role">${ROLE_LABELS[j.role_category] || j.role_category}</span>`;
  const h1bPill = j.h1b_status === "yes" ? '<span class="pill pill-h1b">H1B ✓</span>'
    : j.h1b_status === "no" ? '<span class="pill pill-noh1b">No sponsorship</span>' : "";
  const clearPill = j.clearance_required ? '<span class="pill pill-clearance">🔒 Clearance</span>' : "";
  const optPill = j.opt_friendly ? '<span class="pill pill-h1b">🎓 OPT friendly</span>' : "";
  const h1bHistoryPill = j.h1b_sponsor_tier
    ? `<span class="pill pill-h1b-history" title="Historical H1B filing volume (DOL LCA data) — not a guarantee for this hiring cycle. See docs/STATE.md.">🏛 ${j.h1b_sponsor_tier}</span>`
    : "";
  const techPills = (j.good_tech || []).slice(0, 5).map(t => `<span class="pill pill-tech">${t}</span>`).join("");
  const badPills = (j.bad_tech || []).map(t => `<span class="pill pill-bad">⚠ ${t}</span>`).join("");
  const postedStr = j.posted ? ` &middot; Posted ${j.posted}` : "";

  return `
    <div class="card ${cls}">
      <div class="card-top">
        <div>
          <a href="${j.url}" target="_blank" class="card-title">${j.title}</a>
          <div class="card-company">${j.company} &middot; ${j.location}${postedStr}</div>
        </div>
        <div class="card-right">
          ${bucketHtml} ${scoreBadge(j.score)}
          <div class="card-date">${formatDate(j.date_found)}</div>
        </div>
      </div>
      <div class="card-tags">
        ${rolePill} ${h1bPill} ${h1bHistoryPill} ${optPill} ${clearPill} ${techPills} ${badPills}
      </div>
    </div>`;
}

async function loadJobs() {
  const f = {
    bucket: document.getElementById("f-bucket").value,
    role: document.getElementById("f-role").value,
    exp: document.getElementById("f-exp").value,
    clearance: document.getElementById("f-clearance").value,
    h1b: document.getElementById("f-h1b").value,
    h1b_history: document.getElementById("f-h1b-history").value,
    bad_tech: document.getElementById("f-bad-tech").value,
    search: document.getElementById("f-search").value,
  };
  const sortBy = document.getElementById("f-sort").value;
  const params = new URLSearchParams(Object.entries(f).filter(([,v]) => v)).toString();
  document.getElementById("loading").style.display = "block";
  document.getElementById("jobs-container").innerHTML = "";
  try {
    const data = await fetch(`/api/jobs?${params}`).then(r => r.json());
    document.getElementById("loading").style.display = "none";
    let jobs = data.jobs;
    if (sortBy === "score") {
      jobs = [...jobs].sort((a, b) => (b.score || 0) - (a.score || 0));
    }
    currentJobs = jobs;
    currentPage = 1;
    document.getElementById("results-meta").textContent = `Showing ${data.filtered} of ${data.total} jobs`;
    renderPage();
  } catch(e) {
    document.getElementById("loading").textContent = "Error — is the server running?";
  }
}

function renderPage() {
  const totalPages = Math.max(1, Math.ceil(currentJobs.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageJobs = currentJobs.slice(start, start + PAGE_SIZE);

  document.getElementById("jobs-container").innerHTML = pageJobs.length
    ? pageJobs.map(renderJob).join("")
    : '<div class="empty">No jobs match your filters.</div>';

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById("pagination");
  if (!currentJobs.length) { el.innerHTML = ""; return; }
  el.innerHTML = `
    <button ${currentPage === 1 ? "disabled" : ""} onclick="goToPage(${currentPage - 1})">&larr; Prev</button>
    <span class="page-info">Page ${currentPage} of ${totalPages}</span>
    <button ${currentPage === totalPages ? "disabled" : ""} onclick="goToPage(${currentPage + 1})">Next &rarr;</button>
  `;
}

function goToPage(p) {
  currentPage = p;
  renderPage();
  document.getElementById("jobs-container").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function loadStats() {
  try {
    const s = await fetch("/api/stats").then(r => r.json());
    const row = document.getElementById("stats-row");
    row.children[0].querySelector("strong").textContent = s.total;
    row.children[1].querySelector("strong").textContent = s.yes;
    row.children[2].querySelector("strong").textContent = s.maybe;
    row.children[3].querySelector("strong").textContent = s.h1b_yes;
    document.getElementById("role-stats").innerHTML =
      `ML Eng: ${s.roles.ml_engineer}<br>Data Sci: ${s.roles.data_scientist}<br>Data Eng: ${s.roles.data_engineer}<br>Analyst: ${s.roles.data_analyst}<br>SWE: ${s.roles.swe}<br>Cloud Eng: ${s.roles.cloud_engineer}`;
    document.getElementById("h1b-history-stat").textContent =
      `${s.h1b_known_sponsor_history} of ${s.total} jobs are from companies with H1B filing history (not a sponsorship guarantee — see the ⓘ filter above)`;
  } catch(e) {}
}

let t;
function applyFilters() { clearTimeout(t); t = setTimeout(loadJobs, 300); }

function resetFilters() {
  document.getElementById("f-search").value = "";
  document.getElementById("f-bucket").value = "all";
  document.getElementById("f-role").value = "";
  document.getElementById("f-exp").value = "mid";
  document.getElementById("f-clearance").value = "exclude";
  document.getElementById("f-h1b").value = "all";
  document.getElementById("f-h1b-history").value = "all";
  document.getElementById("f-bad-tech").value = "exclude";
  document.getElementById("f-sort").value = "date";
  loadJobs();
}

// -----------------------------
// Today's New Postings
// -----------------------------
async function loadToday() {
  try {
    const data = await fetch("/api/jobs/today").then(r => r.json());
    document.getElementById("today-badge").textContent = data.total;
    const container = document.getElementById("today-container");
    container.innerHTML = data.jobs.length
      ? data.jobs.map(renderJob).join("")
      : '<div class="empty" style="padding:1.5rem;">No new postings found yet today. Try "Run New Scan".</div>';
  } catch (e) {
    document.getElementById("today-container").innerHTML = '<div class="empty" style="padding:1.5rem;">Could not load today\'s postings.</div>';
  }
}

function toggleToday() {
  document.getElementById("today-wrap").classList.toggle("today-collapsed");
  const icon = document.getElementById("today-toggle-icon");
  icon.textContent = document.getElementById("today-wrap").classList.contains("today-collapsed") ? "▸" : "▾";
}

// -----------------------------
// On-demand scan ("Run New Scan" button)
// -----------------------------
let scanPollTimer = null;

async function runScan() {
  const btn = document.getElementById("scan-btn");
  const status = document.getElementById("scan-status");
  btn.disabled = true;
  status.textContent = "Starting scan…";
  try {
    const res = await fetch("/api/scan", { method: "POST" });
    const data = await res.json();
    if (res.status === 409) {
      status.textContent = "A scan is already running…";
      pollScanStatus();
      return;
    }
    if (!data.ok) {
      status.textContent = data.message || "Could not start scan.";
      btn.disabled = false;
      return;
    }
    status.textContent = "Scanning Google, Apple, Meta, Netflix, Stripe, LinkedIn + 6 more…";
    pollScanStatus();
  } catch (e) {
    status.textContent = "Scan failed to start.";
    btn.disabled = false;
  }
}

function pollScanStatus() {
  clearInterval(scanPollTimer);
  scanPollTimer = setInterval(async () => {
    try {
      const st = await fetch("/api/scan/status").then(r => r.json());
      if (st.running) return;

      clearInterval(scanPollTimer);
      const btn = document.getElementById("scan-btn");
      const status = document.getElementById("scan-status");
      btn.disabled = false;

      if (st.error) {
        status.textContent = `Scan error: ${st.error}`;
      } else if (st.result) {
        const r = st.result;
        if (r.bootstrap) {
          status.textContent = "First-time scan complete — future scans will show new postings.";
        } else {
          status.textContent = `Done: ${r.new_yes} yes + ${r.new_maybe} maybe new (${r.duration_s}s).`;
        }
        // Refresh everything so new results show up without a manual reload.
        loadJobs();
        loadStats();
        loadToday();
      } else {
        status.textContent = "";
      }
    } catch (e) {
      clearInterval(scanPollTimer);
      document.getElementById("scan-btn").disabled = false;
      document.getElementById("scan-status").textContent = "Lost connection while scanning.";
    }
  }, 2000);
}

loadJobs();
loadStats();
loadToday();
</script>
</body>
</html>
